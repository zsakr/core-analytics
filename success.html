<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You - Core Analytics</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .success-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            background: var(--dark);
            color: var(--light);
        }
        .success-container h1 {
            color: var(--primary);
            margin-bottom: 1rem;
        }
        .success-container p {
            margin-bottom: 2rem;
            max-width: 600px;
        }
        .back-home {
            display: inline-block;
            padding: 1rem 2rem;
            background: var(--primary);
            color: var(--dark);
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        .back-home:hover {
            background: var(--primary-dark);
        }
    </style>
</head>
<body>
    <div class="success-container">
        <h1>Thank You for Signing Up!</h1>
        <p>We've received your information and will contact you shortly. Get ready to transform your game with Core Analytics!</p>
        <a href="/" class="back-home">Return to Homepage</a>
    </div>
</body>
</html>
