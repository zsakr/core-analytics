<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Core Analytics</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .signup-form-container {
            max-width: 600px;
            margin: 120px auto 60px;
            padding: 2rem;
            background: var(--surface-color);
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-color);
            font-weight: 500;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(0, 230, 230, 0.1);
        }

        .conditional-field {
            display: none;
            margin-top: 1rem;
        }

        .form-title {
            color: var(--text-color);
            margin-bottom: 2rem;
            text-align: center;
        }

        .required::after {
            content: "*";
            color: #e53e3e;
            margin-left: 4px;
        }

        .submit-button {
            width: 100%;
            padding: 1rem;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .submit-button:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }

        .optional-label {
            color: var(--text-light);
            font-size: 0.875rem;
            margin-left: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="nav-container">
        <nav>
            <a href="index.html" class="nav-logo">
                <img src="assets/images/core_logo.png" alt="Core Analytics Logo">
                <span class="company-title">Core Analytics</span>
            </a>
        </nav>
    </div>

    <div class="container">
        <div class="signup-form-container">
            <h2 class="form-title">Get Started with Core Analytics</h2>
            <form id="signupForm" class="signup-form" action="https://formspree.io/f/xjkgppbe" method="POST">
                <div class="form-group">
                    <label class="required" for="firstName">First Name</label>
                    <input type="text" id="firstName" name="firstName" required>
                </div>

                <div class="form-group">
                    <label class="required" for="lastName">Last Name</label>
                    <input type="text" id="lastName" name="lastName" required>
                </div>

                <div class="form-group">
                    <label class="required" for="email">Email</label>
                    <input type="email" id="email" name="_replyto" required>
                </div>

                <div class="form-group">
                    <label class="required" for="location">Location</label>
                    <input type="text" id="location" name="location" required>
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number <span class="optional-label">(Optional)</span></label>
                    <input type="tel" id="phone" name="phone">
                </div>

                <div class="form-group">
                    <label class="required" for="userType">I am a</label>
                    <select id="userType" name="userType" required>
                        <option value="">Select your role</option>
                        <option value="player">Player</option>
                        <option value="parent">Parent</option>
                        <option value="coach">Coach</option>
                        <option value="academy">Academy</option>
                    </select>
                </div>

                <div id="ageCategory" class="form-group conditional-field">
                    <label class="required" for="playerAge">Player Age Category</label>
                    <select id="playerAge" name="playerAge">
                        <option value="">Select age category</option>
                        <option value="under11">Under 11</option>
                        <option value="under13">Under 13</option>
                        <option value="under15">Under 15</option>
                        <option value="under17">Under 17</option>
                        <option value="under19">Under 19</option>
                        <option value="senior">Senior</option>
                        <option value="professional">Professional Player</option>
                    </select>
                </div>

                <div id="professionalRanking" class="form-group conditional-field">
                    <label class="required" for="ranking">Professional Ranking</label>
                    <input type="number" id="ranking" name="ranking" min="1" placeholder="Enter your current ranking">
                </div>

                <div id="academyDetails" class="form-group conditional-field">
                    <label class="required" for="academyName">Academy Name</label>
                    <input type="text" id="academyName" name="academyName">
                </div>

                <div id="playersCount" class="form-group conditional-field">
                    <label class="required" for="numberOfPlayers">Number of Players</label>
                    <select id="numberOfPlayers" name="numberOfPlayers">
                        <option value="">Select number of players</option>
                        <option value="1-5">1-5 players</option>
                        <option value="6-10">6-10 players</option>
                        <option value="11-20">11-20 players</option>
                        <option value="21-50">21-50 players</option>
                        <option value="50+">More than 50 players</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="required" for="reportsPerMonth">Reports Per Month</label>
                    <select id="reportsPerMonth" name="reportsPerMonth" required>
                        <option value="">Select number of reports</option>
                        <option value="1">1 report/month</option>
                        <option value="2">2 reports/month</option>
                        <option value="4">4 reports/month</option>
                        <option value="8">8 reports/month</option>
                        <option value="custom">Custom</option>
                    </select>
                </div>

                <div id="customReportsField" class="form-group conditional-field">
                    <label class="required" for="customReports">Number of Reports Needed</label>
                    <input type="number" id="customReports" name="customReports" min="1" placeholder="Enter number of reports needed">
                </div>

                <input type="hidden" name="_subject" value="New Core Analytics Signup">
                <input type="hidden" name="_next" value="https://core-analytics.ai/success.html">
                
                <button type="submit" class="submit-button">Submit</button>
            </form>
        </div>
    </div>

    <script>
        // Initialize AOS
        AOS.init({
            duration: 1000,
            once: true
        });

        // Form handling
        const form = document.getElementById('signupForm');
        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            // Show loading state
            const submitButton = form.querySelector('button[type="submit"]');
            const originalButtonText = submitButton.textContent;
            submitButton.textContent = 'Submitting...';
            submitButton.disabled = true;
            
            try {
                const response = await fetch('https://formspree.io/f/xjkgppbe', {
                    method: 'POST',
                    body: new FormData(form),
                    headers: {
                        'Accept': 'application/json'
                    }
                });

                const responseData = await response.json();
                
                if (response.ok) {
                    // Show success message
                    alert('Thank you for signing up! We will contact you shortly.');
                    form.reset();
                    
                    // Redirect to success page
                    window.location.href = 'https://core-analytics.ai/success.html';
                } else {
                    throw new Error(responseData.error || 'Form submission failed');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('There was an error submitting the form. Please try again.');
            } finally {
                // Reset button state
                submitButton.textContent = originalButtonText;
                submitButton.disabled = false;
            }
        });

        // Handle conditional fields
        document.getElementById('userType').addEventListener('change', function() {
            const ageCategory = document.getElementById('ageCategory');
            const playerAge = document.getElementById('playerAge');
            const professionalRanking = document.getElementById('professionalRanking');
            const academyDetails = document.getElementById('academyDetails');
            const playersCount = document.getElementById('playersCount');
            
            // Hide all conditional fields first
            ageCategory.style.display = 'none';
            professionalRanking.style.display = 'none';
            academyDetails.style.display = 'none';
            playersCount.style.display = 'none';
            
            // Reset required attributes
            playerAge.required = false;
            document.getElementById('ranking').required = false;
            document.getElementById('academyName').required = false;
            document.getElementById('numberOfPlayers').required = false;

            // Show relevant fields based on user type
            switch(this.value) {
                case 'player':
                case 'parent':
                    ageCategory.style.display = 'block';
                    playerAge.required = true;
                    const label = document.querySelector('label[for="playerAge"]');
                    label.textContent = this.value === 'parent' ? "Child's Age Category" : "Player Age Category";
                    break;
                case 'coach':
                    playersCount.style.display = 'block';
                    document.getElementById('numberOfPlayers').required = true;
                    break;
                case 'academy':
                    academyDetails.style.display = 'block';
                    playersCount.style.display = 'block';
                    document.getElementById('academyName').required = true;
                    document.getElementById('numberOfPlayers').required = true;
                    break;
            }
        });

        // Handle professional player ranking
        document.getElementById('playerAge').addEventListener('change', function() {
            const professionalRanking = document.getElementById('professionalRanking');
            const rankingInput = document.getElementById('ranking');
            
            if (this.value === 'professional') {
                professionalRanking.style.display = 'block';
                rankingInput.required = true;
            } else {
                professionalRanking.style.display = 'none';
                rankingInput.required = false;
            }
        });

        // Handle custom reports field
        document.getElementById('reportsPerMonth').addEventListener('change', function() {
            const customReportsField = document.getElementById('customReportsField');
            const customReportsInput = document.getElementById('customReports');
            
            if (this.value === 'custom') {
                customReportsField.style.display = 'block';
                customReportsInput.required = true;
            } else {
                customReportsField.style.display = 'none';
                customReportsInput.required = false;
            }
        });
    </script>
</body>
</html>
